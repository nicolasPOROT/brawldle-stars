<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brawldle — Modes de jeu</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/gamemode.css" />
</head>
<body class="bg-stars">

<main class="gamemode-page">
  <section class="gamemode-top">
    <a href="../index.html" class="gamemode-logo-link" title="Accueil">
      <img src="../assets/design/logo_brawldle-stars.png" alt="Brawldle Stars" class="gamemode-logo" />
    </a>
  </section>

  <section class="gamemode-layout">
    <h1 class="gamemode-title title">CHOOSE YOUR GAMEMODE</h1>
    <section class="gamemode-carousel" aria-label="Carrousel des modes de jeu">
      <button type="button" class="modes-prev-btn" id="modesPrevBtn" aria-label="Afficher les modes précédents">
        <img src="../assets/design/arrow-nav-button.png" alt="Précédent" />
      </button>
      <div class="modes-viewport" id="modesViewport">
        <div class="modes-grid" id="modesGrid" aria-label="Liste des modes de jeu"></div>
      </div>
      <button type="button" class="modes-next-btn" id="modesNextBtn" aria-label="Afficher les modes suivants">
        <img src="../assets/design/arrow-nav-button.png" alt="Suivant" />
      </button>
    </section>
  </section>

  <aside class="gamemode-info-panel" id="gamemodeInfoPanel" aria-hidden="true">
    <button type="button" class="gamemode-info-close" id="gamemodeInfoClose" aria-label="Fermer le panneau d'information">
      <img src="../assets/design/cancel-button.png" alt="Fermer" />
    </button>
    <img src="../assets/gamemode/gamemode_info_default.png" alt="Informations sur le mode de jeu" class="gamemode-info-image" />
  </aside>
</main>

<script src="../js/utils.js"></script>
<script src="../js/gamemode_card.js"></script>

</body>
</html>
